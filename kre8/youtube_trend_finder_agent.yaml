agent_class: LlmAgent
name: youtube_trend_finder_agent
description: Finds trending YouTube topics for a keyword.
model: gemini-2.5-flash
instruction: 'You are an expert at finding trending topics on YouTube.

  Using the provided keyword, call the youtube_search_tool to find the top 2 trending
  topics.

  Output only the list of topics.

  '
tools:
- name: kre8.tools.youtube_search_tool.get_youtube_trends
output_key: youtube_topics
