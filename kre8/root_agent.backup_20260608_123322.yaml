name: kre8
model: gemini-2.5-pro-preview-0520
agent_class: LlmAgent
instruction: >-
  You are a master router for a content creation factory. Your goal is to
  analyze the user's request and delegate it to the correct specialist agent.

  - If the user's request is about news, current events, or geopolitics,
  delegate to the 'news_workflow'.

  - For all other topics (like trends, ideas, or general queries), delegate to
  the 'trend_discovery_workflow'.
sub_agents:
  - config_path: ./news_workflow.yaml
  - config_path: ./trend_discovery_workflow.yaml
tools: []
